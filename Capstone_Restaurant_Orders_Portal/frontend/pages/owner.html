<!DOCTYPE html>
<html>
<head>
    <title>Owner Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

    <!-- SIDEBAR -->
    <div class="w-1/4 bg-white shadow-xl p-5">
        <h2 class="text-2xl font-bold mb-6 text-red-500">
            🍽️ My Restaurants
        </h2>

        <div id="restaurantList" class="space-y-3"></div>
    </div>

    <!-- MAIN PANEL -->
    <div class="flex-1 p-8 overflow-y-auto">

        <!-- DEFAULT VIEW -->
        <div id="defaultView">

            <h1 class="text-3xl font-bold mb-6 text-gray-800">
                Create Your Restaurant 🚀
            </h1>

            <div class="bg-white p-6 rounded-2xl shadow-md w-2/3">

                <input id="restName"
                    placeholder="Restaurant Name"
                    class="border p-3 rounded-lg w-full mb-3 focus:ring-2 focus:ring-red-400">

                <input id="restCity"
                    placeholder="City"
                    class="border p-3 rounded-lg w-full mb-3 focus:ring-2 focus:ring-red-400">

                <input id="restDesc"
                    placeholder="Description"
                    class="border p-3 rounded-lg w-full mb-4 focus:ring-2 focus:ring-red-400">

                <button onclick="addRestaurant()"
                    class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg transition">
                    ➕ Add Restaurant
                </button>

            </div>
        </div>

        <!-- RESTAURANT VIEW -->
        <div id="restaurantView" class="hidden">

            <h1 id="selectedRestaurantName"
                class="text-3xl font-bold mb-6 text-gray-800"></h1>

            <!-- ADD CATEGORY -->
            <div class="bg-white p-6 rounded-2xl shadow-md mb-6">

                <h3 class="text-lg font-semibold mb-3">➕ Add Category</h3>

                <div class="flex gap-3">
                    <input id="categoryName"
                        placeholder="Category name"
                        class="border p-3 rounded-lg flex-1 focus:ring-2 focus:ring-blue-400">

                    <button onclick="addCategory()"
                        class="bg-blue-500 hover:bg-blue-600 text-white px-5 rounded-lg transition">
                        Add
                    </button>
                </div>
            </div>

            <!-- CATEGORY CONTAINER -->
            <div id="categoryContainer" class="space-y-5"></div>

        </div>

    </div>

</div>

<script src="../js/owner.js"></script>

</body>
</html>
