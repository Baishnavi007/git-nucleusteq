<!DOCTYPE html>
<html>
<head>
    <title>Select Address</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-3xl mx-auto p-6">

    <h1 class="text-2xl font-bold mb-6">Select Address 📍</h1>

    <div id="addressList" class="mb-6"></div>

    <h3 class="font-bold mb-2">Add New Address</h3>

    <input id="street" placeholder="Street" class="w-full mb-2 p-2 border">
    <input id="city" placeholder="City" class="w-full mb-2 p-2 border">
    <input id="state" placeholder="State" class="w-full mb-2 p-2 border">
    <input id="pincode" placeholder="Pincode" class="w-full mb-2 p-2 border">

    <button onclick="addAddress()"
        class="bg-blue-500 text-white px-4 py-2 rounded mb-4">
        Add Address
    </button>

    <button onclick="placeOrder()"
        class="w-full bg-green-600 text-white py-2 rounded">
        Place Order 🚀
    </button>

</div>

<script src="../js/address.js"></script>

</body>
</html>
