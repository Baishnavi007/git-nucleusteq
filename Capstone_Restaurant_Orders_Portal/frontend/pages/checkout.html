<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-3xl mx-auto p-6">

    <h1 class="text-2xl font-bold mb-6">Order Summary 🧾</h1>

    <!-- CART ITEMS -->
    <div id="orderItems" class="bg-white p-4 rounded shadow mb-4"></div>

    <!-- TOTAL -->
    <h3 class="text-lg font-bold mb-4">
        Total: ₹<span id="totalAmount">0</span>
    </h3>

    <!-- ADDRESS BUTTON -->
    <button onclick="goToAddress()"
        class="w-full bg-blue-500 text-white py-3 rounded-lg mb-3 hover:bg-blue-600">
        Continue to Address →
    </button>

    <!-- PLACE ORDER BUTTON -->
    <button onclick="placeOrder()"
        class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700">
        Place Order ✅
    </button>

</div>

<script src="../js/checkout.js"></script>

</body>
</html>
