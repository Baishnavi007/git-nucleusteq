<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Inventory Dashboard</title>

    <!-- Linking CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header Section -->
<header>
    <h1>Product Inventory Dashboard</h1>
</header>

<!-- Controls Section -->
<section id="controls">
    <!-- This section contains search, filter and sorting options -->

    <h2>Controls</h2>

    <!-- Search Input -->
    <label for="search">Search Product:</label>
    <input type="text" id="search" placeholder="Enter product name">

    <br><br>

    <!-- Category Filter -->
    <label for="categoryFilter">Category:</label>
    <select id="categoryFilter">
        <option value="all">All Categories</option>
    </select>

    <br><br>

    <!-- Low Stock Filter -->
    <!-- Checkbox is used to filter products with stock less than 5 -->
    <label>
        <input type="checkbox" id="lowStock">
        Show Low Stock (less than 5)
    </label>

    <br><br>

    <!-- Sorting Dropdown -->
    <label for="sort">Sort By:</label>
    <select id="sort">
        <option value="default">Default</option>
        <option value="priceLow">Price Low to High</option>
        <option value="priceHigh">Price High to Low</option>
        <option value="az">A - Z</option>
        <option value="za">Z - A</option>
    </select>
</section>

<!-- Analytics Section -->
<section id="analytics">
    <h2>Inventory Analytics</h2>
</section>

<!-- Product Section -->
<section id="productGrid">
    <h2>Products</h2>
</section>

<!-- Add Product Section -->
<section id="addProduct">
    <h2>Add Product</h2>
</section>

<!-- Linking JavaScript -->
<script src="script.js"></script>

</body>
</html>
